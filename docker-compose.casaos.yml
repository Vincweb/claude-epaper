# Variante CasaOS / Raspberry Pi (chemins absolus du Pi, bloc x-casaos).
# Un seul service : app Node + boucle push e-paper dans la même image,
# tirée de Docker Hub (aucun build sur le Pi).
#
# Prérequis : l'image doit exister sur Docker Hub (depuis ton Mac) :
#   ./scripts/build-and-push.sh
#
# Lancement sur le Pi :
#   docker compose -f docker-compose.casaos.yml pull
#   docker compose -f docker-compose.casaos.yml up -d
name: claude-epaper
services:
    claude-epaper:
        image: docker.io/vincweb/claude-epaper:latest
        cpu_shares: 90
        command: []
        container_name: claude-epaper
        deploy:
            resources:
                limits:
                    memory: "8198815744"
        environment:
            CONFIG_DIR: /data
            PORT: "8787"
            EPAPER_PUSH: "1"
            EPD_MODEL: epd2in13_V4
            POLL_SECONDS: "30"
            FULL_REFRESH_EVERY: "30"
            FULL_REFRESH_SECONDS: "3600"
        hostname: claude-epaper
        labels:
            icon: https://github.com/Vincweb/claude-epaper/blob/main/docs/logo.png?raw=true
        networks:
            default: null
        ports:
            - mode: ingress
              target: 8787
              published: "8787"
              protocol: tcp
        devices:
            - /dev/spidev0.0:/dev/spidev0.0
            - /dev/gpiochip0:/dev/gpiochip0
        privileged: true
        restart: unless-stopped
        volumes:
            - type: bind
              source: /home/vincweb/Documents/claude-epaper/data
              target: /data
              bind:
                create_host_path: true
            - type: bind
              source: /home/vincweb/.claude
              target: /root/.claude
              read_only: true
              bind:
                create_host_path: true
networks:
    default:
        name: claude-epaper_default
x-casaos:
    author: self
    category: self
    hostname: ""
    icon: https://github.com/Vincweb/claude-epaper/blob/main/docs/logo.png?raw=true
    index: /
    is_uncontrolled: false
    port_map: "8787"
    scheme: http
    title:
        custom: Claude ePaper
