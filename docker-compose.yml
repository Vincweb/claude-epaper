# Compose Raspberry Pi / CasaOS.
#
# Les images sont pré-construites ici (Mac/CI) et poussées sur Docker Hub :
#   ./scripts/build-and-push.sh
# Sur le Pi, plus rien à builder :
#   docker compose pull && docker compose up -d
#
# Surcharge le registry/tag via un fichier .env (IMAGE_PREFIX=..., TAG=...).
services:
  claude-epaper:
    image: ${IMAGE_PREFIX:-docker.io/vincweb}/claude-epaper:${TAG:-latest}
    container_name: claude-epaper
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - CONFIG_DIR=/data
    volumes:
      # Persistance config + credentials gérés par l'app.
      - ./data:/data
      # Import des credentials Claude Code depuis l'hôte (lecture seule).
      # Adapte le chemin si Claude Code tourne ailleurs.
      - ${HOME}/.claude:/root/.claude:ro
    restart: unless-stopped

  # Boucle push e-paper — à activer UNIQUEMENT sur le Raspberry Pi (accès SPI/GPIO).
  # Ailleurs (NAS/CasaOS sans dalle), lance ce service avec le profil désactivé
  # ou supprime ce bloc.
  epaper-push:
    image: ${IMAGE_PREFIX:-docker.io/vincweb}/claude-epaper-push:${TAG:-latest}
    container_name: epaper-push
    depends_on:
      - claude-epaper
    environment:
      - RENDER_URL=http://claude-epaper:8787/api/render.png
      - EPD_MODEL=epd2in13_V4
      - POLL_SECONDS=30
      - FULL_REFRESH_EVERY=30
      - FULL_REFRESH_SECONDS=3600
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/gpiochip0:/dev/gpiochip0
      # Anciens noyaux : décommenter à la place de gpiochip0.
      # - /dev/gpiomem:/dev/gpiomem
    # Si les devices ne suffisent pas (permissions GPIO), passe en privileged.
    # privileged: true
    restart: unless-stopped
