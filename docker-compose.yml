# Un seul service : app Node + boucle push e-paper dans la même image.
#
# L'image est pré-construite ici (Mac/CI) et poussée sur Docker Hub :
#   ./scripts/build-and-push.sh
# Sur le Pi, plus rien à builder :
#   docker compose pull && docker compose up -d
#
# Surcharge le registry/tag via un fichier .env (IMAGE_PREFIX=..., TAG=...).
services:
  claude-epaper:
    image: ${IMAGE_PREFIX:-docker.io/vincweb}/claude-epaper:${TAG:-latest}
    container_name: claude-epaper
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - CONFIG_DIR=/data
      # Boucle e-paper. Mets EPAPER_PUSH=0 sur une machine sans dalle (NAS/dev).
      - EPAPER_PUSH=1
      - EPD_MODEL=epd2in13_V4
      - POLL_SECONDS=30
      - FULL_REFRESH_EVERY=20
      - FULL_REFRESH_SECONDS=1800
      - EPAPER_THRESHOLD=160
    volumes:
      # Persistance config + credentials gérés par l'app.
      - ./data:/data
      # Import des credentials Claude Code depuis l'hôte (lecture seule).
      - ${HOME}/.claude:/root/.claude:ro
    restart: unless-stopped
    # --- e-paper sur Raspberry Pi : décommenter pour l'accès SPI/GPIO ---
    # privileged: true
    # devices:
    #   - /dev/spidev0.0:/dev/spidev0.0
    #   - /dev/gpiochip0:/dev/gpiochip0
